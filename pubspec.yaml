name: sky_tracker
description: "AirWatch — Real-time flight tracking with futuristic UI"
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2

  # Networking
  dio: ^5.7.0
  web_socket_channel: ^3.0.1

  # Map
  flutter_map: ^8.3.0
  latlong2: ^0.9.1
  flutter_map_animations: ^0.10.0
  flutter_map_marker_cluster: ^8.2.2

  # UI
  google_fonts: ^8.0.2
  shimmer: ^3.0.0
  flutter_animate: ^4.5.2
  glassmorphism: ^3.0.0
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.16

  # Utils
  intl: ^0.20.2
  geolocator: ^14.0.2
  permission_handler: ^12.0.1
  shared_preferences: ^2.3.4
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0
  equatable: ^2.0.7
  collection: ^1.19.1

  # Camera & AR
  camera: ^0.12.0+1
  sensors_plus: ^7.0.0

  # Share
  share_plus: ^12.0.2

  # Notifications (local)
  flutter_local_notifications: ^21.0.0

  # Home Widget
  home_widget: ^0.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.15.0
  freezed: ^3.2.5
  json_serializable: ^6.13.0
  riverpod_generator: ^4.0.3

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/images/
    - assets/flags/4x3/

  # Fonts loaded via google_fonts package at runtime
